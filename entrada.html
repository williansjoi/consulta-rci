<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Consulta Online - Willians Gioia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#1a2332,#1d3a4a);
  font-family:'Segoe UI',sans-serif;
  padding:30px 20px;
  text-align:center;
}
.logo-circle{
  width:140px;height:140px;border-radius:50%;overflow:hidden;
  margin:0 auto 20px;
  box-shadow:0 8px 40px rgba(42,168,160,0.5);
  border:3px solid rgba(42,168,160,0.6);
}
.logo-circle img{width:100%;height:100%;object-fit:cover;display:block;}
.nome{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px;}
.cargo{color:rgba(255,255,255,0.45);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
.msg{color:rgba(255,255,255,0.7);font-size:14px;line-height:1.7;max-width:280px;margin:0 auto 32px;}
.btn{
  display:block;
  background:linear-gradient(135deg,#2aa8a0,#1d7d77);
  color:#fff;text-decoration:none;
  padding:18px 0;width:100%;max-width:280px;
  border-radius:50px;font-size:17px;font-weight:700;
  box-shadow:0 6px 24px rgba(42,168,160,0.5);
  transition:transform 0.15s;
  cursor:pointer;border:none;font-family:inherit;
}
.btn:active{transform:scale(0.97);}
.hint{color:rgba(255,255,255,0.25);font-size:11px;margin-top:20px;line-height:1.7;}
</style>
</head>
<body>

<div class="logo-circle">
  <img src="https://williansjoi.github.io/plataforma-rci/1FEC59FD-287B-4C7A-8D33-3DA2A40DB1D8.png" alt="Gioia Renova">
</div>

<div class="nome">Willians Gioia</div>
<div class="cargo">Terapeuta Integrativo RCI</div>

<p class="msg">Seu terapeuta já está aguardando.<br>Toque no botão para entrar na consulta.</p>

<button class="btn" onclick="window.location.href='consulta.html'">📹 Entrar na Consulta</button>

<p class="hint">Permita o acesso à câmera e ao microfone.<br>Vire o celular na horizontal para melhor experiência.</p>

</body>
</html>
