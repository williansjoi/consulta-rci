<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínica Gioia Renova</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:linear-gradient(160deg,#1a2332,#1d3a4a);
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  padding:30px 16px 50px;
}

/* TOPO */
.topo{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:36px;
}
.logo-topo{
  width:120px;height:120px;border-radius:50%;overflow:hidden;
  box-shadow:0 8px 30px rgba(42,168,160,0.5);
  border:3px solid rgba(42,168,160,0.6);
  margin-bottom:14px;
}
.logo-topo img{width:100%;height:100%;object-fit:cover;display:block;}
.clinica-nome{
  color:#fff;
  font-size:22px;
  font-weight:700;
  letter-spacing:0.5px;
  text-align:center;
}
.clinica-sub{
  color:rgba(255,255,255,0.45);
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:4px;
}
.divisor{
  width:60px;height:2px;
  background:linear-gradient(90deg,#2aa8a0,#c9982a);
  border-radius:2px;
  margin:14px auto 0;
}

/* CARDS */
.cards{
  display:flex;
  flex-direction:column;
  gap:16px;
  max-width:420px;
  margin:0 auto;
}
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(42,168,160,0.25);
  border-radius:16px;
  padding:20px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:10px;
  backdrop-filter:blur(6px);
}
.foto{
  width:90px;height:90px;border-radius:50%;overflow:hidden;
  border:3px solid rgba(42,168,160,0.6);
  box-shadow:0 4px 16px rgba(42,168,160,0.3);
  background:#1a3a4a;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  color:rgba(255,255,255,0.3);
}
.foto img{width:100%;height:100%;object-fit:cover;display:block;}
.terapeuta-nome{
  color:#fff;
  font-size:17px;
  font-weight:700;
}
.areas{
  color:rgba(255,255,255,0.6);
  font-size:13px;
  line-height:1.6;
}
.btn-wp{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#25D366;
  color:#fff;
  text-decoration:none;
  padding:10px 22px;
  border-radius:30px;
  font-size:13px;
  font-weight:700;
  box-shadow:0 4px 14px rgba(37,211,102,0.35);
  transition:transform 0.15s;
  margin-top:4px;
}
.btn-wp:active{transform:scale(0.97);}
.btn-wp svg{width:18px;height:18px;fill:#fff;flex-shrink:0;}

/* RODAPE */
footer{
  text-align:center;
  color:rgba(255,255,255,0.25);
  font-size:11px;
  margin-top:40px;
}
footer span{color:#2aa8a0;}
</style>
