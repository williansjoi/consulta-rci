<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Consulta RCI - Willians Gioia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0d1b2a;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* TELA INICIAL */
#telaInicial{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px 24px;
  gap:16px;
}
.logo-circle{
  width:90px;height:90px;border-radius:50%;overflow:hidden;
  box-shadow:0 0 0 3px rgba(42,168,160,0.6);
}
.logo-circle img{width:100%;height:100%;object-fit:cover;}
.nome{font-size:20px;font-weight:700;margin-top:4px;}
.cargo{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.45);text-transform:uppercase;}
.msg{font-size:14px;color:rgba(255,255,255,0.65);line-height:1.6;max-width:260px;}

.btn{
  background:linear-gradient(135deg,#2aa8a0,#1d7d77);
  color:#fff;border:none;border-radius:50px;
  padding:16px 40px;font-size:16px;font-weight:700;
  cursor:pointer;font-family:inherit;
  box-shadow:0 6px 24px rgba(42,168,160,0.4);
  transition:transform 0.15s;
  width:100%;max-width:280px;
}
.btn:active{transform:scale(0.97);}
.btn:disabled{background:#444;box-shadow:none;cursor:default;}

.hint{font-size:11px;color:rgba(255,255,255,0.3);line-height:1.6;max-width:260px;}

/* STATUS */
#status{
  font-size:13px;
  color:#5dd8d0;
  min-height:18px;
  text-align:center;
}

/* TELA DE CHAMADA */
#telaChamada{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:#000;
  flex-direction:column;
}

#videoRemoto{
  width:100%;height:100%;
  object-fit:cover;
  background:#111;
}

#videoLocal{
  position:absolute;
  bottom:80px;right:12px;
  width:90px;height:120px;
  object-fit:cover;
  border-radius:10px;
  border:2px solid rgba(42,168,160,0.7);
  background:#222;
}

.controles{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:16px;
  display:flex;
  justify-content:center;
  gap:20px;
  background:linear-gradient(transparent,rgba(0,0,0,0.8));
}

.btn-ctrl{
  width:52px;height:52px;border-radius:50%;
  border:none;cursor:pointer;
  font-size:20px;
  display:flex;align-items:center;justify-content:center;
}
.btn-encerrar{background:#e03535;}
.btn-mudo{background:rgba(255,255,255,0.2);}
.btn-cam{background:rgba(255,255,255,0.2);}

#statusChamada{
  position:absolute;
  top:16px;left:0;right:0;
  text-align:center;
  font-size:13px;
  color:rgba(255,255,255,0.7);
  padding:6px 16px;
}

/* AGUARDANDO */
#aguardando{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:rgba(255,255,255,0.5);
  font-size:14px;
  line-height:1.8;
}
.pulsar{
  width:60px;height:60px;border-radius:50%;
  background:rgba(42,168,160,0.2);
  border:2px solid #2aa8a0;
  margin:0 auto 16px;
  animation:pulsar 1.5s ease-in-out infinite;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
@keyframes pulsar{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.15);opacity:0.7;}
}
</style>
</head>
<body>

<!-- TELA INICIAL -->
<div id="telaInicial">
  <div class="logo-circle">
    <img src="https://williansjoi.github.io/plataforma-rci/1FEC59FD-287B-4C7A-8D33-3DA2A40DB1D8.png" alt="Gioia Renova">
  </div>
  <div class="nome">Willians Gioia</div>
  <div class="cargo">Terapeuta Integrativo RCI</div>
  <div class="msg">Toque no botão abaixo para entrar na sala de consulta.</div>
  <div id="status"></div>
  <button class="btn" id="btnEntrar" onclick="entrar()">📹 Entrar na Consulta</button>
  <div class="hint">Permita o acesso à câmera e ao microfone quando solicitado.<br>Vire o celular na horizontal para melhor experiência.</div>
</div>

<!-- TELA DE CHAMADA -->
<div id="telaChamada">
  <video id="videoRemoto" autoplay playsinline></video>
  <video id="videoLocal" autoplay playsinline muted></video>
  <div id="statusChamada">Conectando...</div>
  <div id="aguardando">
    <div class="pulsar">👤</div>
    Aguardando o outro participante<br>entrar na sala...
  </div>
  <div class="controles">
    <button class="btn-ctrl btn-mudo" id="btnMudo" onclick="toggleMudo()" title="Mudo">🎤</button>
    <button class="btn-ctrl btn-encerrar" onclick="encerrar()" title="Encerrar">📵</button>
    <button class="btn-ctrl btn-cam" id="btnCam" onclick="toggleCam()" title="Câmera">📷</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<script>
// ─── CONFIGURAÇÃO ───────────────────────────────────────
// ID da sala — mesmo para terapeuta e paciente
var SALA_ID = 'ConsultaRCI-Willians-2026';

var peer, meuStream, chamadaAtual;
var mudo = false, camDesligada = false;

var iceServers = {
  config: {
    iceServers: [
      {urls: 'stun:stun.l.google.com:19302'},
      {urls: 'stun:stun1.l.google.com:19302'}
    ]
  }
};

function setStatus(msg){
  document.getElementById('status').textContent = msg;
}
function setStatusChamada(msg){
  document.getElementById('statusChamada').textContent = msg;
}

function entrar(){
  document.getElementById('btnEntrar').disabled = true;
  setStatus('Acessando câmera e microfone...');

  navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}, audio:true})
  .then(function(stream){
    meuStream = stream;
    document.getElementById('videoLocal').srcObject = stream;
    setStatus('Conectando à sala...');
    iniciarPeer();
  })
  .catch(function(err){
    setStatus('Erro: permita o acesso à câmera e tente novamente.');
    document.getElementById('btnEntrar').disabled = false;
  });
}

function iniciarPeer(){
  // Tenta entrar como participante principal; se ocupado, entra como secundário
  var idTentativa = SALA_ID;

  peer = new Peer(idTentativa, iceServers);

  peer.on('open', function(id){
    // Conseguiu o ID principal → é o primeiro (terapeuta ou quem entrou primeiro)
    setStatus('Na sala. Aguardando outro participante...');
    mostrarTelaChamada();
    setStatusChamada('Aguardando...');
  });

  peer.on('error', function(err){
    if(err.type === 'unavailable-id'){
      // ID já em uso → entra como segundo participante e liga para o primeiro
      peer.destroy();
      entrarComoSecundario();
    } else {
      setStatus('Erro de conexão. Tente novamente.');
      document.getElementById('btnEntrar').disabled = false;
    }
  });

  // Recebe chamada de quem entrou depois
  peer.on('call', function(call){
    call.answer(meuStream);
    chamadaAtual = call;
    call.on('stream', function(streamRemoto){
      document.getElementById('videoRemoto').srcObject = streamRemoto;
      document.getElementById('aguardando').style.display = 'none';
      setStatusChamada('✅ Conectado');
    });
    call.on('close', function(){
      document.getElementById('aguardando').style.display = 'block';
      setStatusChamada('Chamada encerrada');
    });
  });
}

function entrarComoSecundario(){
  var idSecundario = SALA_ID + '-paciente-' + Date.now();
  peer = new Peer(idSecundario, iceServers);

  peer.on('open', function(){
    mostrarTelaChamada();
    setStatusChamada('Conectando ao terapeuta...');

    var call = peer.call(SALA_ID, meuStream);
    chamadaAtual = call;

    call.on('stream', function(streamRemoto){
      document.getElementById('videoRemoto').srcObject = streamRemoto;
      document.getElementById('aguardando').style.display = 'none';
      setStatusChamada('✅ Conectado');
    });
    call.on('close', function(){
      document.getElementById('aguardando').style.display = 'block';
      setStatusChamada('Chamada encerrada');
    });
    call.on('error', function(){
      setStatusChamada('Erro na conexão.');
    });
  });

  peer.on('error', function(err){
    setStatusChamada('Erro: ' + err.type);
  });
}

function mostrarTelaChamada(){
  document.getElementById('telaInicial').style.display = 'none';
  document.getElementById('telaChamada').style.display = 'flex';
}

function encerrar(){
  if(chamadaAtual) chamadaAtual.close();
  if(meuStream) meuStream.getTracks().forEach(function(t){t.stop();});
  if(peer) peer.destroy();
  document.getElementById('videoRemoto').srcObject = null;
  document.getElementById('videoLocal').srcObject = null;
  document.getElementById('telaInicial').style.display = 'flex';
  document.getElementById('telaChamada').style.display = 'none';
  document.getElementById('aguardando').style.display = 'block';
  document.getElementById('btnEntrar').disabled = false;
  setStatus('');
}

function toggleMudo(){
  mudo = !mudo;
  meuStream.getAudioTracks().forEach(function(t){t.enabled = !mudo;});
  document.getElementById('btnMudo').textContent = mudo ? '🔇' : '🎤';
  document.getElementById('btnMudo').style.background = mudo ? '#e03535' : 'rgba(255,255,255,0.2)';
}

function toggleCam(){
  camDesligada = !camDesligada;
  meuStream.getVideoTracks().forEach(function(t){t.enabled = !camDesligada;});
  document.getElementById('btnCam').textContent = camDesligada ? '🚫' : '📷';
  document.getElementById('btnCam').style.background = camDesligada ? '#e03535' : 'rgba(255,255,255,0.2)';
}
</script>
</body>
</html>
